<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPAS AI 中級考點名詞本</title>
  <style>
    :root {
      --bg: #f3efe5;
      --surface: rgba(255, 252, 246, 0.9);
      --surface-strong: #fffaf0;
      --ink: #17211f;
      --muted: #65716d;
      --line: rgba(23, 33, 31, 0.14);
      --accent: #0f766e;
      --accent-dark: #0b4f4a;
      --accent-soft: #c8f7ee;
      --amber: #f6b642;
      --shadow: 0 22px 60px rgba(23, 33, 31, 0.12);
      --content: min(1760px, calc(100vw - 48px));
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 2%, rgba(246, 182, 66, 0.24), transparent 28rem),
        radial-gradient(circle at 92% 14%, rgba(15, 118, 110, 0.2), transparent 28rem),
        linear-gradient(135deg, #fffaf0 0%, #f7f1e5 45%, #e5f4ef 100%);
      min-height: 100vh;
    }
    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(23, 33, 31, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 33, 31, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, #000, transparent 70%);
    }
    a { color: inherit; text-decoration: none; }
    .hero {
      max-width: var(--content);
      margin: 0 auto;
      padding: 34px 20px 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent-dark);
      font-weight: 900;
      letter-spacing: 0.03em;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background:
        linear-gradient(90deg, transparent 31%, rgba(255,255,255,.8) 31% 36%, transparent 36% 64%, rgba(255,255,255,.8) 64% 69%, transparent 69%),
        linear-gradient(180deg, transparent 31%, rgba(255,255,255,.8) 31% 36%, transparent 36% 64%, rgba(255,255,255,.8) 64% 69%, transparent 69%),
        var(--accent);
      box-shadow: 0 12px 30px rgba(15, 118, 110, 0.24);
    }
    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.9rem;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 250, 240, 0.72);
      padding: 8px 12px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.64fr);
      gap: 28px;
      align-items: stretch;
    }
    h1 {
      margin: 0 0 16px;
      max-width: 840px;
      font-size: clamp(2.4rem, 6vw, 5.4rem);
      line-height: 0.98;
      letter-spacing: -0.07em;
    }
    .lead {
      margin: 0;
      max-width: 720px;
      color: #4d5b57;
      font-size: 1.1rem;
      line-height: 1.9;
    }
    .search-panel {
      border: 1px solid rgba(23, 33, 31, 0.1);
      border-radius: 28px;
      background: rgba(255, 252, 246, 0.86);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .search-panel label {
      display: block;
      color: var(--accent-dark);
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      padding: 6px 12px;
    }
    .search-row span { color: var(--accent); font-size: 1.25rem; }
    #search {
      width: 100%;
      min-height: 44px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
    }
    .search-hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }
    .layout {
      max-width: var(--content);
      margin: 0 auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 12px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 252, 246, 0.84);
      box-shadow: var(--shadow);
      padding: 16px;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }
    .subject-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .subject-tab,
    .category-link,
    .kind-filter {
      border: 1px solid transparent;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      text-align: left;
    }
    .subject-tab {
      padding: 9px 8px;
      text-align: center;
    }
    .subject-tab.active,
    .category-link.active,
    .kind-filter.active {
      border-color: rgba(15, 118, 110, 0.22);
      background: var(--accent-soft);
      color: var(--accent-dark);
    }
    .category-list {
      display: grid;
      gap: 6px;
    }
    .category-link {
      width: 100%;
      padding: 10px 11px;
      display: grid;
      gap: 3px;
    }
    .category-link small {
      color: inherit;
      opacity: 0.72;
      font-weight: 700;
    }
    .content {
      min-width: 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 32px;
      background: rgba(255, 252, 246, 0.9);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 30px);
      margin-bottom: 20px;
    }
    .category-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .category-head h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.55rem);
      line-height: 1.18;
      letter-spacing: -0.04em;
    }
    .category-meta {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--accent-dark);
      font-weight: 900;
    }
    .pill {
      border-radius: 999px;
      background: rgba(200, 247, 238, 0.72);
      padding: 8px 11px;
      white-space: nowrap;
    }
    .infographic {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: white;
    }
    .infographic img {
      display: block;
      width: 100%;
      height: auto;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .kind-filter {
      padding: 8px 11px;
      background: rgba(255, 255, 255, 0.72);
      border-color: var(--line);
    }
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: white;
    }
    table {
      width: 100%;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      text-align: left;
      vertical-align: top;
      line-height: 1.72;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(200, 247, 238, 0.86);
      color: var(--accent-dark);
      font-weight: 950;
    }
    th:nth-child(1), td:nth-child(1) { width: 15%; }
    th:nth-child(2), td:nth-child(2) { width: 22%; }
    th:nth-child(3), td:nth-child(3) { width: 25%; }
    th:nth-child(4), td:nth-child(4) { width: 16%; }
    th:nth-child(5), td:nth-child(5) { width: 15%; }
    th:nth-child(6), td:nth-child(6) { width: 7%; }
    tr:last-child td { border-bottom: 0; }
    .term-name {
      color: var(--ink);
      font-weight: 950;
    }
    .kind {
      display: inline-flex;
      margin-top: 7px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent-dark);
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 900;
    }
    mark {
      border-radius: 4px;
      background: #fde68a;
      color: var(--ink);
      padding: 0 2px;
    }
    .mobile-cards {
      display: none;
      gap: 12px;
    }
    .term-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      padding: 16px;
    }
    .term-card h3 {
      margin: 0 0 10px;
      font-size: 1.12rem;
    }
    .card-row {
      display: grid;
      gap: 4px;
      margin-top: 12px;
    }
    .card-row::before {
      content: attr(data-label);
      color: var(--accent-dark);
      font-size: 0.82rem;
      font-weight: 950;
      letter-spacing: 0.06em;
    }
    .empty {
      border: 1px dashed rgba(15, 118, 110, 0.28);
      border-radius: 22px;
      padding: 24px;
      background: rgba(200, 247, 238, 0.26);
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }
    .result-note {
      margin: 0 0 14px;
      color: var(--muted);
      font-weight: 800;
    }
    @media (max-width: 920px) {
      .hero-grid,
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        max-height: none;
      }
      .category-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 680px) {
      .hero { padding-top: 22px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .stats { justify-content: flex-start; }
      h1 { font-size: clamp(2.25rem, 15vw, 4rem); }
      .category-list { grid-template-columns: 1fr; }
      .category-head { flex-direction: column; }
      .category-meta { justify-content: flex-start; }
      .table-scroll { display: none; }
      .mobile-cards { display: grid; }
      .panel { border-radius: 24px; }
      .infographic {
        overflow-x: auto;
      }
      .infographic img {
        min-width: 760px;
      }
    }
  </style>
</head>

ias(特徵與標籤過度相關)","explanation":"Sampling Bias:只用活躍顧客 → 新顧客預測差(科三 28)","recognition":"AI 偏見三類速辨:Sampling = 取樣偏(族群涵蓋不足)、Label = 標註偏(主觀標錯)、Feature = 特徵偏(資料洩漏近親)","id":"L23402-898","categoryId":"L23402","categoryTitle":"演算法偏見與公平性","subject":"L23","slug":"Label-Bias","confusion":"把 Sampling Bias 與 Label Bias 混淆","kind":"風險/治理"},{"term":"Overfitting","definition":"在訓練深度學習模型的過程中，常常會面臨過擬合（Overfitting）的挑戰，導","explanation":"考題常從 Overfitting 的定義、適用情境或易混淆點出題。","recognition":"看到「易混淆選項術語」時，優先想到「Overfitting」。","id":"L23402-899","categoryId":"L23402","categoryTitle":"演算法偏見與公平性","subject":"L23","slug":"Overfitting","confusion":"常與相近概念混淆，需回到 Overfitting 的定義、適用情境與限制條件辨識。","kind":"模型/演算法"},{"term":"Sampling","definition":"Sampling Bias(訓練樣本族群不代表整體)/ Label Bias(人工標註主觀)/ Feature Bias(特徵與標籤過度相關)","explanation":"Sampling Bias:只用活躍顧客 → 新顧客預測差(科三 28)","recognition":"AI 偏見三類速辨:Sampling = 取樣偏(族群涵蓋不足)、Label = 標註偏(主觀標錯)、Feature = 特徵偏(資料洩漏近親)","id":"L23402-900","categoryId":"L23402","categoryTitle":"演算法偏見與公平性","subject":"L23","slug":"Sampling","confusion":"把 Sampling Bias 與 Label Bias 混淆","kind":"風險/治理"},{"term":"TPR","definition":"三大公平性指標:(1) Demographic Parity(人口平等, DP):P(Ŷ=1|A=a) = P(Ŷ=1|A=b),各族群預測為陽性比例相等;(2) Equal Opportunity(平等機會, EOpp):P(Ŷ=1|Y…","explanation":"考題常把 TPR 放在定義辨識、適用情境或易混淆選項中。","recognition":"公平性三指標:DP 看『預測』(整體陽性比例)、EOpp 看『真為正者 TPR』、EO 看『TPR + FPR 都相等』;三者層次漸進嚴格","id":"L23402-901","categoryId":"L23402","categoryTitle":"演算法偏見與公平性","subject":"L23","slug":"TPR","confusion":"把 DP 與 EOpp 混淆","kind":"公式/指標"},{"term":"Transformer","definition":"Network, RNN），到近年在自然語言處理領域中大放異彩的 Transformer，以及具","explanation":"Transformer 雖捕捉上下文,但偏差仍存","recognition":"看到「Transformer」時，優先想到「Transformer」。","id":"L23402-902","categoryId":"L23402","categoryTitle":"演算法偏見與公平性","subject":"L23","slug":"Transformer","confusion":"常與相近概念混淆，需回到 Transformer 的定義、適用情境與限制條件辨識。","kind":"模型/演算法"}]}</script>
  <script>
    const DATA = JSON.parse(document.getElementById('glossary-data').textContent);
    const categories = DATA.categories;
    const terms = DATA.terms;
    const subjects = ['L21', 'L22', 'L23'];
    let currentSubject = 'L21';
    let currentCategory = categories[0]?.id;
    let currentKind = '全部';

    const searchInput = document.getElementById('search');
    const app = document.getElementById('app');
    const subjectTabs = document.getElementById('subjectTabs');
    const categoryList = document.getElementById('categoryList');

    function subjectLabel(subject) {
      return { L21: 'L21 科一', L22: 'L22 科二', L23: 'L23 科三' }[subject] || subject;
    }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'": '&#39;'}[char]));
    }
    function highlight(text, query) {
      const safe = escapeHtml(text);
      if (!query) return safe;
      const escaped = Array.from(query).map(char => '.+*?^$()[]{}|\\'.includes(char) ? '\\' + char : char).join('');
      return safe.replace(new RegExp(escaped, 'ig'), match => '<mark>' + match + '</mark>');
    }
    function termSearchText(term) {
      return [term.term, term.definition, term.explanation, term.confusion, term.recognition, term.categoryTitle, term.kind].join(' ').toLowerCase();
    }
    function setHash(categoryId) {
      history.replaceState(null, '', '#/' + categoryId);
    }
    function readHash() {
      const match = location.hash.match(/^#\/(L\d{5})/);
      if (match && categories.some(category => category.id === match[1])) {
        currentCategory = match[1];
        currentSubject = categories.find(category => category.id === currentCategory).subject;
      }
    }
    function renderNav() {
      subjectTabs.innerHTML = subjects.map(subject => '<button class="subject-tab ' + (subject === currentSubject ? 'active' : '') + '" data-subject="' + subject + '">' + subjectLabel(subject) + '</button>').join('');
      const visible = categories.filter(category => category.subject === currentSubject);
      categoryList.innerHTML = visible.map(category => '<button class="category-link ' + (category.id === currentCategory ? 'active' : '') + '" data-category="' + category.id + '"><strong>' + category.id + '</strong><small>' + escapeHtml(category.title) + ' · ' + category.count + '</small></button>').join('');
    }
    function renderRows(list, query) {
      const rows = list.map(term => '<tr id="' + term.slug + '"><td><div class="term-name">' + highlight(term.term, query) + '</div><span class="kind">' + escapeHtml(term.kind) + '</span></td><td>' + highlight(term.definition, query) + '</td><td>' + highlight(term.explanation, query) + '</td><td>' + highlight(term.confusion || '考題多從定義、適用情境或相近概念混淆。', query) + '</td><td>' + highlight(term.recognition, query) + '</td><td>'  + '</td></tr>').join('');
      const cards = list.map(term => '<article class="term-card" id="card-' + term.slug + '"><h3>' + highlight(term.term, query) + '</h3><span class="kind">' + escapeHtml(term.kind) + '</span><div class="card-row" data-label="一句話定義">' + highlight(term.definition, query) + '</div><div class="card-row" data-label="白話解釋">' + highlight(term.explanation, query) + '</div><div class="card-row" data-label="易混淆">' + highlight(term.confusion || '考題多從定義、適用情境或相近概念混淆。', query) + '</div><div class="card-row" data-label="一句話辨識法">' + highlight(term.recognition, query) + '</div></article>').join('');
      return {
        table: '<div class="table-scroll"><table><thead><tr><th scope="col">名詞</th><th scope="col">一句話定義</th><th scope="col">白話解釋</th><th scope="col">易混淆</th><th scope="col">辨識法</th></tr></thead><tbody>' + rows + '</tbody></table></div>',
        cards: '<div class="mobile-cards">' + cards + '</div>'
      };
    }
    function renderKindFilters(list) {
      const kinds = ['全部', ...Array.from(new Set(list.map(term => term.kind))).sort((a, b) => a.localeCompare(b, 'zh-Hant'))];
      if (!kinds.includes(currentKind)) currentKind = '全部';
      return '<div class="filter-row">' + kinds.map(kind => '<button class="kind-filter ' + (kind === currentKind ? 'active' : '') + '" data-kind="' + escapeHtml(kind) + '">' + escapeHtml(kind) + '</button>').join('') + '</div>';
    }
    function renderCategory() {
      const category = categories.find(item => item.id === currentCategory) || categories[0];
      currentCategory = category.id;
      currentSubject = category.subject;
      const all = terms.filter(term => term.categoryId === category.id);
      const filtered = currentKind === '全部' ? all : all.filter(term => term.kind === currentKind);
      const rendered = renderRows(filtered, '');
      app.innerHTML = '<section class="panel"><div class="category-head"><div><h2>' + category.id + ' ' + escapeHtml(category.title) + '</h2></div><div class="category-meta"><span class="pill">' + subjectLabel(category.subject) + '</span><span class="pill">' + all.length + ' 名詞</span></div></div><figure class="infographic"><img src="./' + category.image + '" alt="' + category.id + ' ' + escapeHtml(category.title) + ' 資訊圖表"></figure></section><section class="panel">' + renderKindFilters(all) + rendered.table + rendered.cards + '</section>';
      setHash(category.id);
      renderNav();
    }
    function renderSearch(query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) {
        renderCategory();
        return;
      }
      const results = terms.filter(term => termSearchText(term).includes(normalized)).slice(0, 160);
      const rendered = renderRows(results, query.trim());
      app.innerHTML = '<section class="panel"><div class="category-head"><div><h2>搜尋結果</h2><p class="result-note">「' + escapeHtml(query.trim()) + '」找到 ' + results.length + ' 筆' + (results.length === 160 ? '（只顯示前 160 筆）' : '') + '</p></div></div>' + (results.length ? rendered.table + rendered.cards : '<div class="empty">找不到符合的名詞，請換一個關鍵字。</div>') + '</section>';
    }
    subjectTabs.addEventListener('click', event => {
      const button = event.target.closest('[data-subject]');
      if (!button) return;
      currentSubject = button.dataset.subject;
      currentCategory = categories.find(category => category.subject === currentSubject).id;
      currentKind = '全部';
      searchInput.value = '';
      renderCategory();
    });
    categoryList.addEventListener('click', event => {
      const button = event.target.closest('[data-category]');
      if (!button) return;
      currentCategory = button.dataset.category;
      currentSubject = categories.find(category => category.id === currentCategory).subject;
      currentKind = '全部';
      searchInput.value = '';
      renderCategory();
    });
    app.addEventListener('click', event => {
      const button = event.target.closest('[data-kind]');
      if (!button) return;
      currentKind = button.dataset.kind;
      renderCategory();
    });
    searchInput.addEventListener('input', event => renderSearch(event.target.value));
    window.addEventListener('hashchange', () => {
      readHash();
      currentKind = '全部';
      searchInput.value = '';
      renderCategory();
    });
    readHash();
    renderCategory();
  </script>
